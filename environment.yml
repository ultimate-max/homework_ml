# 创建: conda env create -f environment.yml
# 更新: conda env update -f environment.yml --prune
#
# PyTorch 通过 pip 安装（见 requirements.txt）。
# RTX 50xx：先执行
#   pip install --pre torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cu128
# 再 pip install numpy dill pytest matplotlib scipy（勿用本文件自动装 cu121 版 torch）。
# 其他 GPU：pip install -r requirements.txt
# 勿在此文件中加入 conda 的 pytorch / cpuonly，否则会覆盖 pip 版且 torch.cuda 为 False。

name: frictionest
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - pytest
  - pip
  - pip:
      - -r requirements.txt
